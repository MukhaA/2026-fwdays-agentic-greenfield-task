<!-- @dsCard group="Components" viewport="700x360" name="Battle — reveal, score, verdict" subtitle="ScoreHeader, BattleRow, WinnerBanner, Confetti; staggered reveal + count-up" -->
<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:22px;background:var(--bg);color:var(--text);font-family:var(--font-sans)}
.sh{text-align:center}.sh .k{color:var(--text-muted);font-size:12px;letter-spacing:.04em}
.sh .sc{font-family:var(--font-serif);font-size:40px;margin-top:10px}
.win{margin-top:6px;font-family:var(--font-serif);font-style:italic;font-size:18px;color:var(--accent-primary)}
.tbl{border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:16px}
.rw{display:grid;grid-template-columns:1fr 160px 1fr;align-items:center;border-top:1px solid var(--border)}
.rw:first-child{border-top:none}
.ca{padding:13px 20px;text-align:right;font-family:var(--font-serif);font-size:20px}
.cb{padding:13px 20px;text-align:left;font-family:var(--font-serif);font-size:20px}
.lbl{text-align:center;padding:13px 8px;color:var(--text-muted);font-size:13px;background:var(--surface-track)}
.win-a{color:var(--accent-primary);font-weight:600}.win-b{color:var(--accent-secondary);font-weight:600}.mut{color:var(--text-muted)}</style></head><body>
<div class="sh"><div class="k">HEAD TO HEAD</div><div class="sc"><span style="color:var(--accent-primary)">9</span><span class="mut" style="margin:0 12px;font-size:24px">—</span><span style="color:var(--accent-secondary)">6</span></div><div class="win">Winner · <strong>Mukha Andrii</strong></div></div>
<div class="tbl">
  <div class="rw"><div class="ca win-a">5.6k</div><div class="lbl">Total stars</div><div class="cb mut">812</div></div>
  <div class="rw"><div class="ca mut">1.2k</div><div class="lbl">Followers</div><div class="cb win-b">3.7k</div></div>
  <div class="rw"><div class="ca mut">42</div><div class="lbl">Original repos</div><div class="cb win-b">128</div></div>
  <div class="rw"><div class="ca win-a">5y</div><div class="lbl">Account age</div><div class="cb mut">3y</div></div>
</div>
</body></html>
