<!-- @dsCard group="Components" viewport="700x380" name="Data — cards &amp; charts" subtitle="MetricCard, LanguageDonut, ActivityChart, ReachBar, RepoSplit" -->
<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:22px;background:var(--bg);color:var(--text);font-family:var(--font-sans);display:flex;flex-direction:column;gap:16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.mc{padding:16px;background:var(--surface)}.mc .l{color:var(--text-muted);font-size:12px}.mc .v{font-family:var(--font-serif);font-weight:500;font-size:30px;margin-top:8px;line-height:1}
.panel{border:1px solid var(--border);border-radius:16px;padding:20px;background:var(--surface)}
.don{position:relative;width:120px;height:120px}
.bar{flex:1;height:20px;background:var(--surface-track);border-radius:6px;overflow:hidden}</style></head><body>
<div class="grid">
  <div class="mc"><div class="l">Total stars</div><div class="v">5.6k</div></div>
  <div class="mc"><div class="l">Followers</div><div class="v">3.7k</div></div>
  <div class="mc"><div class="l">Original repos</div><div class="v">42</div></div>
  <div class="mc"><div class="l">Account age</div><div class="v">5y</div></div>
</div>
<div style="display:flex;gap:16px">
  <div class="panel" style="display:flex;align-items:center;gap:20px;flex:1">
    <div class="don"><div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(#b45a29 0deg 150deg,#5f7355 150deg 250deg,#3178c6 250deg 320deg,var(--surface-track) 320deg 360deg)"></div><div style="position:absolute;inset:22px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:26px">5</div></div>
    <div style="flex:1;font-size:13px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="width:10px;height:10px;border-radius:3px;background:#b45a29"></span>TypeScript<span style="margin-left:auto;color:var(--text-muted)">42%</span></div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="width:10px;height:10px;border-radius:3px;background:#5f7355"></span>Go<span style="margin-left:auto;color:var(--text-muted)">28%</span></div>
      <div style="display:flex;gap:8px;align-items:center"><span style="width:10px;height:10px;border-radius:3px;background:#3178c6"></span>Python<span style="margin-left:auto;color:var(--text-muted)">19%</span></div>
    </div>
  </div>
  <div class="panel" style="flex:1">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px"><div style="width:80px;font-size:13px">Stars</div><div class="bar"><div style="height:100%;width:100%;background:var(--accent-primary)"></div></div><div style="font-family:var(--font-serif);font-size:17px">5.6k</div></div>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px"><div style="width:80px;font-size:13px">Forks</div><div class="bar"><div style="height:100%;width:16%;background:var(--accent-primary)"></div></div><div style="font-family:var(--font-serif);font-size:17px">869</div></div>
    <div style="display:flex;height:28px;border-radius:8px;overflow:hidden;background:var(--surface-track);margin-top:14px"><div style="width:52%;background:var(--accent-primary)"></div><div style="width:48%;background:var(--accent-secondary)"></div></div>
  </div>
</div>
</body></html>
